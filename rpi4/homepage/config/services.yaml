---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services

- Music:
    - SoundVault:
        icon: mdi-music-circle
        href: {{HOMEPAGE_VAR_SOUNDVAULT_URL}}
        server: rpi4-docker
        widget:
          type: iframe
          name: Sound Vault
          src: "{{HOMEPAGE_VAR_SOUNDVAULT_URL}}/?embed=1"
          classes: h-96 w-full
          referrerPolicy: same-origin
          allowFullscreen: false


- Photos:
    - Immich:
        icon: immich.png
        href: {{HOMEPAGE_VAR_IMMICH_URL}}
        description: Photo & video management
        server: n100-docker
        container: immich_server
        widget:
          type: immich
          url: {{HOMEPAGE_VAR_IMMICH_IP}}
          key: {{HOMEPAGE_VAR_IMMICH_API_KEY}}
          version: 2


- Dev Tools:
    - Uptime Kuma:
        icon: uptime-kuma.png
        href: {{HOMEPAGE_VAR_KUMA_URL}}
        description: Service uptime monitor
        server: rpi4-docker
        container: uptime-kuma
        widget:
          type: uptimekuma
          url: {{HOMEPAGE_VAR_KUMA_IP}}
          slug: {{HOMEPAGE_VAR_KUMA_SLUG}} # create a status page in Kuma UI with this slug first

    - WG-Easy:
        icon: wireguard.png
        href: {{HOMEPAGE_VAR_WGEASY_URL}}
        description: WireGuard VPN
        server: rpi4-docker
        container: wg-easy

    - Vaultwarden:
        icon: vaultwarden.png
        href: {{HOMEPAGE_VAR_VAULTWARDEN_URL}}
        description: Password manager
        server: rpi4-docker
        container: vaultwarden

    - Pi-hole:
        icon: pi-hole.png
        href: {{HOMEPAGE_VAR_PIHOLE_URL}}
        description: Network-wide ad blocker
        server: rpi4-docker
        container: pihole
        widget:
          type: pihole
          version: 6 # required if running v6 or higher, defaults to 5
          url: {{HOMEPAGE_VAR_PIHOLE_IP}}
          key: {{HOMEPAGE_VAR_PIHOLE_PASSWORD}} # optional, in v6 can be your password or app password


    - Npm:
        icon: nginx-proxy-manager.png
        href: {{HOMEPAGE_VAR_NPM_URL}}
        description: Proxy, SSL & traffic manager
        server: rpi4-docker
        container: nginx-proxy-manager
        widget:
          type: npm
          url: {{HOMEPAGE_VAR_NPM_IP}}
          username: {{HOMEPAGE_VAR_NPM_USERNAME}}
          password: {{HOMEPAGE_VAR_NPM_PASSWORD}}


- RPi4:
    - RPi 4 Model B:
        icon: raspberry-pi.png
        href: {{HOMEPAGE_VAR_GLANCES_RPI4_URL}}
        description: BCM2711 Quad-core A72 @ 1.8GHz · 2GB LPDDR4 · SPCC SSD 512GB · Debian 11 (bullseye)

- RPi4-Stats:
    - CPU:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_SERVER_IP}}:61208
          version: 4
          metric: cpu
    - Memory:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_SERVER_IP}}:61208
          version: 4
          metric: memory
    - SD Card:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_SERVER_IP}}:61208
          version: 4
          metric: fs:/host
    - SSD SPCC 512GB:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_SERVER_IP}}:61208
          version: 4
          metric: "fs:/host{{HOMEPAGE_VAR_RPI4_SSD1_DRIVE}}"
    - Network:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_SERVER_IP}}:61208
          version: 4
          metric: network:eth0


- N100:
    - Ninkear N10:
        icon: mdi-desktop-classic
        href: {{HOMEPAGE_VAR_GLANCES_N100_URL}}
        description: Intel N100 · 16GB DDR4 · Quanji N300 512GB · Debian 13 (trixie)

- N100-Stats:
    - CPU:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_N100_IP}}:61208
          version: 4
          metric: cpu
    - Memory:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_N100_IP}}:61208
          version: 4
          metric: memory
    - SSD Quanji 512GB:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_N100_IP}}:61208
          version: 4
          metric: fs:/host
    - SSD BX500 1TB:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_N100_IP}}:61208
          version: 4
          metric: "fs:/host{{HOMEPAGE_VAR_N100_SSD1_DRIVE}}"
    - Network:
        widget:
          type: glances
          url: http://{{HOMEPAGE_VAR_N100_IP}}:61208
          version: 4
          metric: network:enp2s0


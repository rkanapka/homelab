include:
  - immich/docker-compose.yml

services:
  dockerproxy-n100:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy-n100
    environment:
      - CONTAINERS=1
      - POST=0
    ports:
      - 2376:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
